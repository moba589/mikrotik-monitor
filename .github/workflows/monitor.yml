name: MikroTik Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore state
        run: |
          if [ -f monitor_state.json ]; then
            echo "State file found"
          else
            echo "{}" > monitor_state.json
          fi

      - name: Run monitor
        env:
          GITHUB_TOKEN:   ${{ secrets.MONITOR_GITHUB_TOKEN }}
          GITHUB_USER:    moba589
          GITHUB_REPO:    mikrotik-monitor
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM:     ${{ secrets.ALERT_FROM }}
          ALERT_TO:       ${{ secrets.ALERT_TO }}
        run: python monitor.py

      - name: Save state
        run: |
          git config user.name  "Monitor Bot"
          git config user.email "onboarding@resend.dev"
          git pull --rebase origin main || true
          git add monitor_state.json alert_log.json || true
          git diff --staged --quiet || git commit -m "Monitor state $(date -u +%H:%M:%S)"
          git push
