name: MikroTik Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Routers and Update Status
        run: |
          TIME=$(date '+%d-%b-%Y %H:%M:%S')
          echo "=== MikroTik Monitor === $TIME"

          check_tcp() {
            local IP=$1 PORT=$2
            timeout 6 bash -c "echo >/dev/tcp/$IP/$PORT" 2>/dev/null
            [ $? -eq 0 ] && echo "up" || echo "down"
          }

          echo "--- Router 1 ---"
          R1_S=$(check_tcp "115.42.66.83"    "80")
          R1_M=$(check_tcp "125.209.101.214" "80")
          echo "Spotcomm : $R1_S"
          echo "Multinet : $R1_M"

          echo "--- Router 2 ---"
          R2_I=$(check_tcp "BRANCH_IP" "80")
          echo "ISP1 : $R2_I"

          [ "$R1_S" = "down" ] && [ "$R1_M" = "down" ] && R1_DOWN="true" || R1_DOWN="false"
          [ "$R2_I" = "down" ] && R2_DOWN="true" || R2_DOWN="false"

          echo "Router 1 Down: $R1_DOWN"
          echo "Router 2 Down: $R2_DOWN"

          echo "R1_DOWN=$R1_DOWN" >> $GITHUB_ENV
          echo "R2_DOWN=$R2_DOWN" >> $GITHUB_ENV
          echo "CHECK_TIME=$TIME" >> $GITHUB_ENV

          python3 << PYEOF
          import json
          r1s = "$R1_S"
          r1m = "$R1_M"
          r2i = "$R2_I"
          t   = "$TIME"
          r1_down = (r1s == "down" and r1m == "down")
          r2_down = (r2i == "down")

          r1_up   = [] if r1s == "down" else [{"label":"Spotcomm","ip":"115.42.66.83","ms":0}]
          r1_dn   = [{"label":"Spotcomm","ip":"115.42.66.83","error":"Unreachable"}] if r1s == "down" else []
          r2_up   = [] if r2i == "down" else [{"label":"ISP1","ip":"BRANCH_IP","ms":0}]
          r2_dn   = [{"label":"ISP1","ip":"BRANCH_IP","error":"Unreachable"}] if r2i == "down" else []

          data = {
            "updated_at": t,
            "r1_down": r1_down,
            "r1_status": {
              "name": "Router 1 - Main Office",
              "all_down": r1_down,
              "checked_at": t,
              "up_hosts": r1_up,
              "down_hosts": r1_dn
            },
            "r2_down": r2_down,
            "r2_status": {
              "name": "Router 2 - Branch",
              "all_down": r2_down,
              "checked_at": t,
              "up_hosts": r2_up,
              "down_hosts": r2_dn
            }
          }
          with open("alert_log.json","w") as f:
              json.dump(data, f, indent=2, ensure_ascii=True)
          print("JSON written OK")
          PYEOF

      - name: Commit Status
        run: |
          git config user.name  "MikroTik Monitor"
          git config user.email "monitor@github.com"
          git add alert_log.json
          git diff --staged --quiet || git commit -m "Monitor ${{ env.CHECK_TIME }}"
          git push

      - name: Send Email Alert
        if: env.R1_DOWN == 'true' || env.R2_DOWN == 'true'
        run: |
          python3 << PYEOF
          import smtplib, ssl
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          import os

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_PASS']
          alert_to   = os.environ['ALERT_EMAIL']
          r1_down    = os.environ['R1_DOWN'] == 'true'
          r2_down    = os.environ['R2_DOWN'] == 'true'
          chk_time   = os.environ['CHECK_TIME']

          subject = "Router Down Alert! - " + chk_time
          r1_txt  = "OFFLINE" if r1_down else "ONLINE"
          r2_txt  = "OFFLINE" if r2_down else "ONLINE"

          body_text = f"""MikroTik Router Alert
          Time: {chk_time}
          Router 1: {r1_txt}
          Router 2: {r2_txt}
          Dashboard: https://cjinternet.free.nf/"""

          body_html = f"""<div style="font-family:Arial,sans-serif;max-width:500px">
          <div style="background:#ef4444;color:white;padding:20px;border-radius:10px 10px 0 0">
          <h2>Router Down Alert</h2><p>{chk_time}</p></div>
          <div style="padding:20px;border:1px solid #fca5a5;border-radius:0 0 10px 10px">
          <p><b>Router 1:</b> {"❌ OFFLINE" if r1_down else "✅ ONLINE"}</p>
          <p><b>Router 2:</b> {"❌ OFFLINE" if r2_down else "✅ ONLINE"}</p>
          <a href="https://cjinternet.free.nf/" style="background:#3b82f6;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block">Open Dashboard</a>
          </div></div>"""

          msg = MIMEMultipart('alternative')
          msg['Subject'] = subject
          msg['From']    = gmail_user
          msg['To']      = alert_to
          msg.attach(MIMEText(body_text, 'plain'))
          msg.attach(MIMEText(body_html,  'html'))

          ctx = ssl.create_default_context()
          with smtplib.SMTP('smtp.gmail.com', 587) as s:
              s.starttls(context=ctx)
              s.login(gmail_user, gmail_pass)
              s.sendmail(gmail_user, alert_to, msg.as_string())
          print("Email sent OK")
          PYEOF
        env:
          GMAIL_USER:   ${{ moba@cloudjunction.cloud }}
          GMAIL_PASS:   ${{ enegaqmhokvoqdie }}
          ALERT_EMAIL:  ${{ adminpk@cloudjunction.cloud }}
          R1_DOWN:      ${{ env.R1_DOWN }}
          R2_DOWN:      ${{ env.R2_DOWN }}
          CHECK_TIME:   ${{ env.CHECK_TIME }}
